[HOTKEYS]
host_0 = win+1
host_1 = win+2
host_2 = win+3

[MONITOR]
; Path to ControlMyMonitor.exe for DDC/CI monitor switching.
; Download from: https://www.nirsoft.net/utils/control_my_monitor.html
clickmon = dependencies\ControlMyMonitor.exe
; DDC/CI input source values per host. Run ControlMyMonitor.exe to find yours.
; Common values: 15=DisplayPort, 17=HDMI-1, 18=HDMI-2
; Leave empty to skip monitor switching for that host.
host_0 = 15
host_1 = 18
host_2 =
